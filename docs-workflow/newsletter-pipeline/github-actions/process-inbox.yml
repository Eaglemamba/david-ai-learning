# GitHub Actions workflow for auto-processing newsletter articles
# Copy this file to each target repo: .github/workflows/process-inbox.yml
#
# Triggers when a new markdown file is pushed to the /inbox/ directory.
# Uses Claude Code to analyze the articles based on the repo's CLAUDE.md instructions.

name: Process Newsletter Inbox

on:
  push:
    paths:
      - 'inbox/*.md'
    branches:
      - main

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect new inbox files
        id: detect
        run: |
          # Get the list of added/modified files in inbox/
          FILES=$(git diff --name-only HEAD~1 HEAD -- 'inbox/*.md' 2>/dev/null || echo "")
          if [ -z "$FILES" ]; then
            echo "No new inbox files detected"
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          else
            echo "New inbox files:"
            echo "$FILES"
            echo "has_files=true" >> "$GITHUB_OUTPUT"
            # Pass first file as the target (typically one per day)
            FIRST_FILE=$(echo "$FILES" | head -1)
            echo "target_file=$FIRST_FILE" >> "$GITHUB_OUTPUT"
          fi

      - name: Process with Claude Code
        if: steps.detect.outputs.has_files == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Install Claude Code CLI
          npm install -g @anthropic-ai/claude-code

          # Run Claude with the repo's CLAUDE.md context
          TARGET="${{ steps.detect.outputs.target_file }}"
          DATE=$(basename "$TARGET" .md)

          claude -p "
            Read the file ${TARGET} which contains newsletter articles routed to this repo.
            Follow the instructions in CLAUDE.md to analyze each article.
            Write your analysis to output/${DATE}_analysis.md.
            Be thorough but concise. Focus on actionable insights.
          "

      - name: Commit analysis output
        if: steps.detect.outputs.has_files == 'true'
        run: |
          git config user.name "Newsletter Bot"
          git config user.email "bot@amaran-daily.local"
          git add output/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No analysis output to commit"
          else
            DATE=$(basename "${{ steps.detect.outputs.target_file }}" .md)
            git commit -m "Analyze newsletter articles for ${DATE}

            Auto-generated by newsletter pipeline."
            git push
          fi
