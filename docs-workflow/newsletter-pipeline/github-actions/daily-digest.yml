# Daily Newsletter Digest — GitHub Actions Workflow
#
# Runs every day at 7:00 AM (Asia/Taipei = UTC-8, so 23:00 UTC previous day)
# Fetches newsletters via Gmail API, generates HTML digest, commits to repo.
#
# Required GitHub Secrets:
#   GMAIL_CLIENT_ID      — Google Cloud OAuth client ID
#   GMAIL_CLIENT_SECRET   — Google Cloud OAuth client secret
#   GMAIL_REFRESH_TOKEN   — Gmail OAuth refresh token (from fetch-gmail-api.py --auth)
#
# Setup: Copy this file to .github/workflows/daily-digest.yml in the main repo.

name: Daily Newsletter Digest

on:
  schedule:
    # 7:00 AM Asia/Taipei = 23:00 UTC (previous day)
    - cron: '0 23 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch newsletters from Gmail
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: |
          cd docs-workflow/newsletter-pipeline
          python3 fetch-gmail-api.py --output digest-output/raw-$(date +%Y-%m-%d).json

      - name: Generate HTML digest
        run: |
          cd docs-workflow/newsletter-pipeline
          mkdir -p digest-output
          python3 generate-digest.py --input digest-output/raw-$(date +%Y-%m-%d).json

      - name: Commit digest to repo
        run: |
          DATE=$(date +%Y-%m-%d)
          git config user.name "Newsletter Bot"
          git config user.email "bot@newsletter-digest.local"
          git add docs-workflow/newsletter-pipeline/digest-output/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No new digest to commit"
          else
            git commit -m "Daily digest for ${DATE}

          Auto-generated by newsletter pipeline."
            git push
          fi
