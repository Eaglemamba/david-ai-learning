// ─── LocalStorage progress ───
const STORAGE_KEY = 'ai-learning-path-progress';

function loadProgress() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function saveProgress(p) { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); }

function toggleDoc(file) {
  const p = loadProgress();
  p[file] = !p[file];
  if (!p[file]) delete p[file];
  saveProgress(p);
  render();
}

function resetProgress() {
  if (confirm('確定要重置所有進度嗎？')) {
    localStorage.removeItem(STORAGE_KEY);
    render();
  }
}

// ─── Render ───
function render() {
  const progress = loadProgress();
  const container = document.getElementById('pathContainer');

  // Compute totals
  const allDocs = stages.flatMap(s => s.docs);
  const totalDocs = allDocs.length;
  const completedDocs = allDocs.filter(d => progress[d.file]).length;
  const pct = totalDocs > 0 ? Math.round(completedDocs / totalDocs * 100) : 0;

  // Update overall progress
  document.getElementById('overallPct').textContent = pct + '%';
  document.getElementById('overallCount').textContent = `${completedDocs} / ${totalDocs}`;
  document.getElementById('overallBar').style.width = pct + '%';
  const circle = document.getElementById('progressCircle');
  const circumference = 2 * Math.PI * 28;
  circle.style.strokeDashoffset = circumference - (pct / 100) * circumference;

  // Render stages
  container.innerHTML = stages.map((stage, si) => {
    const stageDone = stage.docs.filter(d => progress[d.file]).length;
    const stageTotal = stage.docs.length;
    const stagePct = stageTotal > 0 ? Math.round(stageDone / stageTotal * 100) : 0;
    const stageRequired = stage.docs.filter(d => d.required);
    const stageRequiredDone = stageRequired.filter(d => progress[d.file]).length;
    const allRequiredDone = stageRequiredDone === stageRequired.length;
    const isLast = si === stages.length - 1;

    return `
    <div class="stage-connector" style="--line-color:${stage.color};--line-color-next:${stages[si+1]?.color || stage.color}; padding-left: 0;">

      <!-- Stage Header -->
      <div class="flex items-start gap-4 mb-4">
        <div class="stage-badge flex-shrink-0" style="background: ${stage.color}">
          ${stage.icon}
        </div>
        <div class="flex-1 pt-1">
          <div class="flex items-center gap-3 flex-wrap">
            <h2 class="text-xl font-bold text-gray-900">Stage ${stage.id}：${stage.title}</h2>
            ${allRequiredDone ? '<span class="text-xs px-2 py-0.5 rounded-full bg-green-100 text-green-700 font-semibold">✓ 必讀完成</span>' : ''}
          </div>
          <p class="text-sm text-gray-500 mt-0.5">${stage.subtitle}</p>
          <p class="text-xs text-gray-400 mt-1">${stage.description}</p>
          <!-- Stage progress bar -->
          <div class="flex items-center gap-2 mt-2">
            <div class="flex-1 bg-gray-200 rounded-full h-2 max-w-[200px]">
              <div class="milestone-bar rounded-full h-2" style="width:${stagePct}%;background:${stage.color}"></div>
            </div>
            <span class="mono text-xs text-gray-400">${stageDone}/${stageTotal}</span>
          </div>
        </div>
      </div>

      <!-- Doc Cards -->
      <div class="ml-[28px] pl-8 ${isLast ? '' : 'pb-8'} border-l-0 space-y-2">
        ${stage.docs.map((doc, di) => {
          const done = progress[doc.file];
          return `
          <div class="doc-item flex items-start gap-3 bg-white rounded-lg border ${done ? 'border-green-200 bg-green-50/30' : 'border-gray-200'} px-4 py-3 ${done ? 'completed' : ''}">
            <div class="check-box flex-shrink-0 w-5 h-5 rounded border-2 ${done ? 'checked bg-amaran-purple border-amaran-purple' : 'border-gray-300'} flex items-center justify-center mt-0.5"
              onclick="toggleDoc('${doc.file}')"></div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 flex-wrap">
                <a href="docs/${doc.file}" target="_blank" class="doc-title text-sm font-medium ${done ? 'text-gray-400 line-through' : 'text-gray-900 hover:text-amaran-purple'} transition-colors">${doc.title}</a>
                ${doc.required ? '<span class="prereq-badge">必讀</span>' : '<span class="optional-badge">選讀</span>'}
              </div>
              <p class="text-xs text-gray-400 mt-0.5">${doc.why}</p>
            </div>
            <span class="mono text-xs text-gray-300 flex-shrink-0 mt-1">${di + 1}/${stage.docs.length}</span>
          </div>`;
        }).join('')}
      </div>

      ${!isLast ? `
      <!-- Stage transition -->
      <div class="ml-[28px] flex items-center gap-2 py-2">
        <div class="w-8 border-t-2 border-dashed" style="border-color:${stage.color}"></div>
        <span class="text-xs font-medium" style="color:${stage.color}">${allRequiredDone ? '✓ Ready for next stage' : `Complete ${stageRequired.length - stageRequiredDone} required reading(s) to advance`}</span>
      </div>` : ''}
    </div>`;
  }).join('');
}

render();
</script>
</body>
</html>
