const catColors={Agent:'#a5b4fc',Tool:'#fca5a5',LLM:'#93c5fd',Prompt:'#fcd34d',Framework:'#c4b5fd',Analysis:'#67e8f9',Automation:'#86efac',Security:'#fca5a5',Content:'#fdba74',API:'#c4b5fd',Research:'#d6d3d1'};
const tagCls={Agent:'bg-indigo-50 text-indigo-700 border border-indigo-200',Tool:'bg-red-50 text-red-700 border border-red-200',LLM:'bg-blue-50 text-blue-700 border border-blue-200',Prompt:'bg-amber-50 text-amber-700 border border-amber-200',Framework:'bg-purple-50 text-purple-700 border border-purple-200',Analysis:'bg-cyan-50 text-cyan-700 border border-cyan-200',Automation:'bg-green-50 text-green-700 border border-green-200',Security:'bg-rose-50 text-rose-700 border border-rose-200',Content:'bg-orange-50 text-orange-700 border border-orange-200',API:'bg-violet-50 text-violet-700 border border-violet-200',Research:'bg-gray-100 text-gray-700 border border-gray-200'};
const filterTags=['all','Agent','Tool','LLM','Prompt','Framework','Analysis','Automation'];
let activeFilter='all';

function initFilters(){
    document.getElementById('filterBtns').innerHTML=filterTags.map(f=>{
        const active=f===activeFilter;
        const cls=active?'bg-amaran-purple text-white border-amaran-purple':'border-gray-200 text-gray-600 bg-white hover:border-amaran-purple hover:text-amaran-purple';
        return `<button class="filter-btn px-3 py-1.5 rounded-lg text-xs font-medium border ${cls}" onclick="setFilter('${f}',this)">${f==='all'?'All':f}</button>`;
    }).join('');
}

function setFilter(f,btn){
    activeFilter=f;initFilters();renderCards();
}

// Build a lookup from searchIndex: docFile → array of section entries
const sectionsByFile = {};
if (typeof searchIndex !== 'undefined') {
    searchIndex.forEach(e => {
        if (!sectionsByFile[e.docFile]) sectionsByFile[e.docFile] = [];
        sectionsByFile[e.docFile].push(e);
    });
}

let prevSortBeforeSearch = 'date-desc';

function getFiltered(){
    let d=[...documents];
    const s=document.getElementById('searchBox').value.toLowerCase().trim();
    const sortEl=document.getElementById('sortSelect');

    // Auto-switch to relevance sort when searching, restore when cleared
    if(s && sortEl.value !== 'relevance' && !sortEl._userChanged){
        prevSortBeforeSearch = sortEl.value;
        sortEl.value = 'relevance';
    } else if(!s && sortEl.value === 'relevance' && !sortEl._userChanged){
        sortEl.value = prevSortBeforeSearch;
    }
    sortEl._userChanged = false;

    // Reset search metadata
    d.forEach(x => { x._hits = null; x._score = 0; x._matchTypes = []; });

    if(s){
        d = d.filter(x => {
            let score = 0;
            const types = [];

            // 1) Title match (highest weight)
            if(x.title.toLowerCase().includes(s)){ score += 10; types.push('title'); }

            // 2) Tag match
            if(x.tags.some(t=>t.toLowerCase().includes(s))){ score += 5; types.push('tag'); }

            // 3) Summary match
            if(x.summary.toLowerCase().includes(s)){ score += 3; types.push('summary'); }

            // 4) Source match
            if(x.source.toLowerCase().includes(s)){ score += 2; types.push('title'); }

            // 5) Deep content match via searchIndex
            const sections = sectionsByFile[x.file] || [];
            const hits = sections.filter(sec => sec.content.toLowerCase().includes(s));
            if (hits.length > 0) {
                score += Math.min(hits.length, 8); // cap content score at 8
                types.push('content');
                x._hits = hits.map(h => ({
                    sectionTitle: h.sectionTitle,
                    sectionId: h.sectionId,
                    snippet: getSnippet(h.content, s)
                }));
            }

            x._score = score;
            x._matchTypes = [...new Set(types)];
            return score > 0;
        });
    }

    if(activeFilter!=='all')d=d.filter(x=>x.tags.includes(activeFilter));

    const sort=sortEl.value;
    if(sort==='relevance' && s){
        d.sort((a,b) => b._score - a._score || b.date.localeCompare(a.date));
    } else {
        d.sort((a,b)=>{
            if(sort==='date-desc')return b.date.localeCompare(a.date);
            if(sort==='date-asc')return a.date.localeCompare(b.date);
            if(sort==='rating-desc')return(b.rating||0)-(a.rating||0);
            return(a.rating||0)-(b.rating||0);
        });
    }
    return d;
}

function getSnippet(content, query) {
    const lower = content.toLowerCase();
    const idx = lower.indexOf(query);
    if (idx === -1) return '';
    const start = Math.max(0, idx - 40);
    const end = Math.min(content.length, idx + query.length + 60);
    let snippet = (start > 0 ? '…' : '') + content.substring(start, end) + (end < content.length ? '…' : '');
    // Highlight the matched term
    const esc = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    snippet = snippet.replace(new RegExp('(' + esc + ')', 'gi'), '<mark>$1</mark>');
    return snippet;
}

function renderStats(){
    const t=documents.length,avg=(documents.filter(d=>d.rating).reduce((s,d)=>s+d.rating,0)/documents.filter(d=>d.rating).length).toFixed(1);
    const lines=documents.filter(d=>d.lines).reduce((s,d)=>s+d.lines,0);
    const tc={};documents.flatMap(d=>d.tags).forEach(t=>tc[t]=(tc[t]||0)+1);
    const top=Object.entries(tc).sort((a,b)=>b[1]-a[1])[0];
    const linked=documents.filter(d=>d.file).length;
    const stats=[{v:t,l:'Documents'},{v:avg,l:'Avg Rating'},{v:(lines/1000).toFixed(1)+'K',l:'Total Lines'},{v:top[0],l:`Top (${top[1]})`},{v:linked,l:'Linked'}];
    document.getElementById('statsRow').innerHTML=stats.map(s=>`<div class="bg-white/10 backdrop-blur rounded-lg px-4 py-3 border border-white/20 hover:border-white/40 transition-colors text-center"><div class="mono text-2xl font-bold text-white">${s.v}</div><div class="text-xs text-purple-200 mt-0.5">${s.l}</div></div>`).join('');
    const sorted=Object.entries(tc).sort((a,b)=>b[1]-a[1]);
    const all=documents.flatMap(d=>d.tags).length;
    document.getElementById('categoryBar').innerHTML=sorted.map(([t,c])=>`<div style="width:${c/all*100}%;background:${catColors[t]||'#6b7280'}"></div>`).join('');
    document.getElementById('categoryLegend').innerHTML=sorted.map(([t,c])=>`<div class="flex items-center gap-1.5 text-xs text-gray-500"><div class="w-2 h-2 rounded-sm" style="background:${catColors[t]||'#6b7280'}"></div>${t} (${c})</div>`).join('');
}

function renderCards(){
    const docs=getFiltered();
    const s=document.getElementById('searchBox').value.toLowerCase().trim();
    // Update result count
    const countEl=document.getElementById('resultCount');
    if(countEl){countEl.textContent=s?`${docs.length} results`:'';countEl.style.display=s?'inline':'none';}
    document.body.classList.toggle('search-active', !!s);
    if(!docs.length){document.getElementById('docGrid').innerHTML='<div class="col-span-full text-center py-12 text-gray-400">No documents match.</div>';return;}

    // Find max score for relative bar widths
    const maxScore = Math.max(...docs.map(d=>d._score||0), 1);

    document.getElementById('docGrid').innerHTML=docs.map((d,i)=>{
        const rc=d.rating>=4.0?'text-green-600':d.rating>=3.0?'text-amber-600':'text-red-500';
        const rd=d.rating?`<span class="mono font-semibold ${rc}">${d.rating}/5</span>`:'<span class="text-gray-300">—</span>';
        const tags=d.tags.map(t=>`<span class="text-[10px] px-2 py-0.5 rounded-full font-medium ${tagCls[t]||'bg-gray-100 text-gray-600'}">${t}</span>`).join('');
        const badge=d.file?'<span class="text-[10px] px-1.5 py-0.5 rounded bg-amaran-purple/10 text-amaran-purple font-medium">HTML</span>':'';
        const btn=d.file?`<a href="docs/${d.file}" target="_blank" class="text-xs bg-amaran-purple text-white px-3 py-1 rounded hover:bg-amaran-purple-light no-underline">Open</a>`:'';

        // Relevance indicator (only shown when searching)
        let relevanceHtml='';
        if(s && d._score > 0){
            const pct = Math.round(d._score / maxScore * 100);
            const barColor = pct >= 70 ? '#482A77' : pct >= 40 ? '#6B4A9E' : '#a78bfa';
            const badgeMap = { title:'Title', tag:'Tag', summary:'Summary', content:'Content' };
            const badgeCls = { title:'match-badge-title', tag:'match-badge-tag', summary:'match-badge-summary', content:'match-badge-content' };
            const matchBadges = d._matchTypes.map(t=>`<span class="match-badge ${badgeCls[t]}">${badgeMap[t]}</span>`).join('');
            relevanceHtml=`<div class="flex items-center gap-2 mt-2">
                <div class="match-badges">${matchBadges}</div>
                <div class="flex-1 bg-gray-100 rounded-full h-1.5"><div class="relevance-bar h-1.5 rounded-full" style="width:${pct}%;background:${barColor}"></div></div>
                <span class="mono text-[10px] text-gray-400">#${i+1}</span>
            </div>`;
        }

        // Deep search hit snippets
        let hitsHtml='';
        if(d._hits && d._hits.length > 0){
            const maxShow = 3;
            const shown = d._hits.slice(0, maxShow);
            const more = d._hits.length > maxShow ? `<div class="text-[10px] text-gray-400 mt-1">+${d._hits.length - maxShow} more matches</div>` : '';
            hitsHtml=`<div class="search-hits">
                <div class="hit-title">Content matches (${d._hits.length})</div>
                ${shown.map(h=>`<div class="hit-item"><span class="hit-section">${h.sectionTitle}</span>：${h.snippet}</div>`).join('')}
                ${more}
            </div>`;
        }

        // Border highlight for top results
        const borderCls = s && d._score > 0
            ? (d._score / maxScore >= 0.7 ? 'border-amaran-purple' : d._score / maxScore >= 0.4 ? 'border-purple-300' : 'border-gray-200')
            : 'border-gray-200';

        // Clean search mode: hide date, source, lines; show summary only when no content matches
        const hasHits = d._hits && d._hits.length > 0;
        const showMeta = !s;
        const showSummary = !s || !hasHits;

        return `<div class="doc-card bg-white rounded-xl border ${borderCls} p-4 flex flex-col">
            ${showMeta ? `<div class="flex items-center justify-between"><span class="mono text-xs text-gray-400">${d.date}</span>${badge}</div>` : ''}
            <h3 class="text-sm font-semibold text-gray-900 ${showMeta ? 'mt-2' : ''} leading-snug">${d.title}</h3>
            ${showMeta ? `<p class="text-xs text-gray-500 mt-1">${d.source}</p>` : ''}
            <div class="flex gap-1.5 flex-wrap mt-2">${tags}</div>
            ${relevanceHtml}
            ${showSummary ? `<p class="text-xs text-gray-600 leading-relaxed mt-2 flex-1">${d.summary}</p>` : ''}
            ${hitsHtml}
            <div class="flex items-center justify-between mt-3 pt-3 border-t border-gray-100">
                <div class="flex items-center gap-3">${rd}${showMeta ? `<span class="mono text-[10px] text-gray-400">${d.lines?d.lines+' lines':''}</span>` : ''}</div>${btn}
            </div></div>`;
    }).join('');
}

let searchTimer;
document.getElementById('searchBox').addEventListener('input',()=>{
    clearTimeout(searchTimer);
    searchTimer=setTimeout(renderCards, 150);
});
initFilters();renderStats();renderCards();
</script>
