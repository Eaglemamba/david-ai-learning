// ══════════════════════════════════════════
// RENDER ENGINE
// ══════════════════════════════════════════

function escapeHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function copyText(text, btn){
  navigator.clipboard.writeText(text).catch(()=>{
    const ta=document.createElement('textarea');ta.value=text;
    document.body.appendChild(ta);ta.select();document.execCommand('copy');
    document.body.removeChild(ta);
  });
  btn.textContent='Copied!';btn.classList.add('copied');
  setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied');},1400);
}

function renderNav(){
  const nav=document.getElementById('nav');
  nav.innerHTML=sections.map(s=>
    `<button class="nav-btn" data-id="${s.id}">${escapeHtml(s.title)}</button>`
  ).join('');
  nav.querySelectorAll('.nav-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      nav.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('s-'+btn.dataset.id)?.scrollIntoView({behavior:'smooth',block:'start'});
    });
  });
  nav.querySelector('.nav-btn')?.classList.add('active');
}

function renderCmdRow(s){
  return `<div class="cmd-row">
    ${s.step?`<span class="cmd-step">${escapeHtml(s.step)}</span>`:''}
    <code class="cmd-code">${escapeHtml(s.cmd)}</code>
    <button class="copy-btn" onclick="copyText(${JSON.stringify(s.cmd)},this)">Copy</button>
  </div>`;
}

function renderCodeBlock(code){
  return `<div class="code-block-wrap">
    <pre class="code-block">${escapeHtml(code)}</pre>
    <button class="copy-btn" onclick="copyText(${JSON.stringify(code)},this)">Copy</button>
  </div>`;
}

function renderTable(rows,cols){
  return `<div style="overflow-x:auto;margin-top:8px"><table class="data-table">
    <thead><tr>${cols.map(c=>`<th>${escapeHtml(c)}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(r=>`<tr>${Object.values(r).map((v,i)=>`<td>${escapeHtml(v)}</td>`).join('')}</tr>`).join('')}</tbody>
  </table></div>`;
}

function renderBadge(type,label,content){
  const isHtml = typeof content==='string' && content.trim().startsWith('<');
  return `<div class="badge badge-${type}">
    <span class="badge-label">${label}</span>
    ${isHtml ? content : escapeHtml(content)}
  </div>`;
}

function renderSubsection(sub){
  let h='';
  if(sub.subtitle) h+=`<h3 class="sub-title">${escapeHtml(sub.subtitle)}</h3>`;
  if(sub.description) h+=`<p class="sub-desc">${escapeHtml(sub.description)}</p>`;
  if(sub.bulletPoints) h+=`<ul class="bullet-list">${sub.bulletPoints.map(b=>`<li>${escapeHtml(b)}</li>`).join('')}</ul>`;
  if(sub.steps) h+=`<div class="cmd-list">${sub.steps.map(renderCmdRow).join('')}</div>`;
  if(sub.codeBlock) h+=renderCodeBlock(sub.codeBlock);
  if(sub.tableData){
    const cols=sub.tableData[0]?.detail?['Item','Description','Details']:['Item','Description'];
    h+=renderTable(sub.tableData,cols);
  }
  if(sub.tips) h+=renderBadge('tip','Tip','<ul>'+sub.tips.map(t=>'<li>'+escapeHtml(t)+'</li>').join('')+'</ul>');
  if(sub.notes) sub.notes.forEach(n=>{ h+=renderBadge('note','Note',n); });
  if(sub.warnings) sub.warnings.forEach(w=>{ h+=renderBadge('warning','Warning',w); });
  return `<div class="subsection">${h}</div>`;
}

function renderAll(){
  const el=document.getElementById('content');
  let html='';
  sections.forEach(sec=>{
    html+=`<div class="section" id="s-${sec.id}"><h2 class="section-title">${escapeHtml(sec.title)}</h2>`;
    sec.subsections.forEach(sub=>{ html+=renderSubsection(sub); });
    html+=`</div>`;
  });
  el.innerHTML=html;
}
